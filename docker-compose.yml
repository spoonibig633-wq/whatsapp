services:
  wish-bot:
    build: .
    container_name: wish-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # Persist WhatsApp session, config, and media across container restarts
      - ./sessions:/app/sessions
      - ./media:/app/media
      - ./config.json:/app/config.json
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
